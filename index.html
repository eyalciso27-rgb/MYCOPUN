<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>הארנק המאובטח</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@400;600&display=swap" rel="stylesheet"/>

    <script>
        const supabaseUrl = 'https://iaihwnbbebjsirlhezwb.supabase.co';
        const supabaseKey = 'sb_publishable_JOxGwNl2y2S-wUL2Xp3LLA_Xn9UxEHJ';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#00C853", dark: "#1a1a1a" },
                    fontFamily: { sans: ['Assistant', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toggle-checkbox:checked { right: 0; border-color: #00C853; }
        .toggle-checkbox:checked + .toggle-label { background-color: #00C853; }
        .toggle-checkbox { right: 0; z-index: 1; border-color: #e2e8f0; transition: all 0.3s; }
        .toggle-label { width: 3rem; height: 1.5rem; background-color: #cbd5e1; border-radius: 9999px; transition: all 0.3s; }
    </style>
</head>
<body class="bg-[#F4F7F6] text-dark font-sans pb-32">

    <div id="login-screen" class="fixed inset-0 z-[200] bg-white flex flex-col items-center justify-center p-8 text-center">
        <div class="w-20 h-20 bg-primary/10 rounded-3xl flex items-center justify-center mb-8">
            <span class="material-symbols-rounded text-5xl text-primary">lock</span>
        </div>
        <h1 class="text-3xl font-extrabold mb-2">הארנק החכם</h1>
        <p class="text-slate-400 mb-10 text-lg">מוצפן, מאובטח ומסודר לפי חוצצים</p>
        <button onclick="signInWithGoogle()" class="w-full max-w-xs flex items-center justify-center gap-3 bg-white border border-slate-200 p-5 rounded-2xl font-bold shadow-sm active:scale-95 transition-all">
            <img src="https://www.google.com/favicon.ico" class="w-5 h-5"> כניסה עם Google
        </button>
    </div>

    <div id="pending-screen" class="hidden fixed inset-0 z-[150] bg-white flex flex-col items-center justify-center p-8 text-center">
        <span class="material-symbols-rounded text-6xl text-amber-500 mb-6 animate-pulse">admin_panel_settings</span>
        <h2 class="text-2xl font-bold mb-4">ממתין לאישור מנהל</h2>
        <p class="text-slate-500 mb-8">לאחר האישור, הכספת שלך תפתח.</p>
        <button onclick="signOut()" class="text-slate-400 underline font-bold">התנתק</button>
    </div>

    <div id="app-content" class="hidden">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-100">
            <div class="px-6 py-5 flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black text-dark">הקופונים שלי</h1>
                    <p id="total-value" class="text-[14px] text-primary font-bold">סה"כ: ₪0</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="openSettings()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 border border-slate-200">
                        <span class="material-symbols-rounded">settings</span>
                    </button>
                    <button onclick="signOut()" class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 border border-slate-200">
                        <span class="material-symbols-rounded">logout</span>
                    </button>
                </div>
            </div>
            
            <div id="tabs-container" class="px-6 pb-4 flex gap-2 overflow-x-auto no-scrollbar scroll-smooth">
                </div>
        </header>

        <main class="p-6 space-y-4" id="main-container">
            </main>

        <button onclick="openAddModal()" class="fixed bottom-8 left-6 right-6 z-40 bg-primary text-white py-4 rounded-2xl shadow-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
            <span class="material-symbols-rounded">add</span> הוספת קופון חדש
        </button>
    </div>

    <div id="editModal" class="hidden fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-t-[2.5rem] sm:rounded-3xl w-full max-w-md p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modalTitle" class="text-xl font-extrabold">קופון חדש</h3>
                <button onclick="closeEdit()" class="text-slate-300"><span class="material-symbols-rounded">close</span></button>
            </div>
            
            <div class="space-y-4">
                <input type="hidden" id="edit_id" value="new">
                
                <input type="text" id="edit_company" list="companiesList" placeholder="שם המותג (למשל: רמי לוי)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold border border-transparent focus:border-primary/20">
                <datalist id="companiesList"></datalist>

                <input type="text" id="edit_category" list="categoriesList" placeholder="שם החוצץ (מזון, פארם...)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold border border-transparent focus:border-primary/20">
                <datalist id="categoriesList"></datalist>

                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="edit_value" placeholder="שווי (₪)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold border border-transparent focus:border-primary/20">
                    <input type="date" id="edit_expiry" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold text-right border border-transparent focus:border-primary/20">
                </div>

                <input type="text" id="edit_code" placeholder="קוד קופון או לינק (יוצפן בענן)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-semibold border border-transparent focus:border-primary/20">
                
                <button onclick="saveToCloud()" class="w-full bg-primary text-white py-5 rounded-2xl font-bold text-lg mt-2 shadow-lg active:scale-95 transition-transform">שמור בכספת</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/40 backdrop-blur-sm">
        <div class="bg-white rounded-t-[2.5rem] sm:rounded-3xl w-full max-w-md p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-extrabold">הגדרות התראות</h3>
                <button onclick="closeSettings()" class="text-slate-300"><span class="material-symbols-rounded">close</span></button>
            </div>
            
            <div class="flex items-center justify-between bg-white border border-slate-200 p-5 rounded-2xl mb-6 shadow-sm">
                <div>
                    <span class="font-extrabold text-slate-800 block">קבלת התראות למייל</span>
                    <span class="text-xs text-slate-400">מונע איבוד קופונים שפג תוקפם</span>
                </div>
                <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                    <input type="checkbox" id="master_toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer" onchange="toggleSubOptions()"/>
                    <label for="master_toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer"></label>
                </div>
            </div>

            <div id="sub_options" class="space-y-3 mb-8 transition-opacity duration-300">
                <p class="text-slate-500 mb-4 text-sm font-bold">מתי תרצה לקבל תזכורת?</p>
                <label class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl cursor-pointer">
                    <span class="font-bold text-slate-700">14 ימים לפני</span>
                    <input type="checkbox" id="set_14_days" class="w-5 h-5 accent-primary">
                </label>
                <label class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl cursor-pointer">
                    <span class="font-bold text-slate-700">7 ימים לפני</span>
                    <input type="checkbox" id="set_7_days" class="w-5 h-5 accent-primary">
                </label>
                <label class="flex items-center justify-between bg-slate-50 p-4 rounded-2xl cursor-pointer">
                    <span class="font-bold text-slate-700">יום אחד לפני</span>
                    <input type="checkbox" id="set_1_day" class="w-5 h-5 accent-primary">
                </label>
            </div>

            <button onclick="saveSettings()" class="w-full bg-dark text-white py-4 rounded-2xl font-bold active:scale-95 transition-transform">שמור הגדרות</button>
        </div>
    </div>

    <script>
        let allCoupons = [];
        let profile = null;
        let groupKey = null;
        let selectedTab = 'הכל';

        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const { data: userProfile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).maybeSingle();
                if (userProfile) {
                    profile = userProfile;
                    document.getElementById('login-screen').classList.add('hidden');
                    
                    if (profile.is_approved) {
                        document.getElementById('app-content').classList.remove('hidden');
                        document.getElementById('pending-screen').classList.add('hidden');
                        await fetchOrCreateGroupKey(profile.group_id);
                        loadFromCloud();
                    } else {
                        document.getElementById('pending-screen').classList.remove('hidden');
                    }
                }
            }
        }

        async function fetchOrCreateGroupKey(groupId) {
            const { data } = await supabaseClient.from('group_keys').select('encryption_key').eq('group_id', groupId).maybeSingle();
            if (data && data.encryption_key) {
                groupKey = data.encryption_key;
            } else {
                const randomKey = Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b => b.toString(16).padStart(2, '0')).join('');
                await supabaseClient.from('group_keys').insert([{ group_id: groupId, encryption_key: randomKey }]);
                groupKey = randomKey;
            }
        }

        function encrypt(text) { 
            if(!text) return "";
            return CryptoJS.AES.encrypt(text, groupKey).toString(); 
        }

        function decrypt(ciphertext) {
            if(!ciphertext) return "";
            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, groupKey);
                const originalText = bytes.toString(CryptoJS.enc.Utf8);
                return originalText.length > 0 ? originalText : ciphertext;
            } catch (e) { return ciphertext; }
        }

        async function loadFromCloud() {
            const { data, error } = await supabaseClient.from('coupons').select('*').order('is_redeemed', { ascending: true }).order('expiry_date', { ascending: true });
            if (data) {
                allCoupons = data.map(c => ({ ...c, code_or_link: decrypt(c.code_or_link) }));
                updateAutocomplete();
                renderTabs();
                render();
            }
        }

        function updateAutocomplete() {
            // רשימות מותגים נפוצים + קיימים
            const companies = [...new Set(allCoupons.map(c => c.company).filter(Boolean))];
            const defaultCompanies = ["רמי לוי", "שופרסל", "מקס סטוק", "פוקס", "טרמינל X", "סופר-פארם", "וולט"];
            const finalCompanies = [...new Set([...companies, ...defaultCompanies])].sort();
            document.getElementById('companiesList').innerHTML = finalCompanies.map(name => `<option value="${name}">`).join('');

            // רשימת קטגוריות נפוצות + קיימות
            const categories = [...new Set(allCoupons.map(c => c.category).filter(Boolean))];
            const defaultCats = ["מזון", "פארם", "אופנה", "בית", "מסעדות"];
            const finalCats = [...new Set([...categories, ...defaultCats])].sort();
            document.getElementById('categoriesList').innerHTML = finalCats.map(cat => `<option value="${cat}">`).join('');
        }

        function renderTabs() {
            const uniqueCategories = [...new Set(allCoupons.map(c => c.category).filter(Boolean))];
            const allTabs = ['הכל', ...uniqueCategories.sort()];
            
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = allTabs.map(tab => `
                <button onclick="selectTab('${tab}')" class="whitespace-nowrap px-5 py-2 rounded-full text-sm font-bold border transition-all ${
                    selectedTab === tab 
                    ? 'bg-dark text-white border-dark shadow-md' 
                    : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                }">
                    ${tab}
                </button>
            `).join('');
        }

        function selectTab(tab) {
            selectedTab = tab;
            renderTabs();
            render();
        }

        function render() {
            const container = document.getElementById('main-container');
            const filteredCoupons = selectedTab === 'הכל' ? allCoupons : allCoupons.filter(c => c.category === selectedTab);

            // חישוב סך הכל (₪) לחוצץ הנוכחי
            let totalVal = 0;
            filteredCoupons.forEach(c => {
                if(!c.is_redeemed) {
                    const val = parseFloat(String(c.value).replace(/[^0-9.]/g, '')) || 0;
                    totalVal += val;
                }
            });
            document.getElementById('total-value').innerText = `סה"כ: ₪${totalVal.toLocaleString()}`;

            if (filteredCoupons.length === 0) {
                container.innerHTML = `<div class="text-center p-10 text-slate-400">החוצץ ריק...</div>`;
                return;
            }

            container.innerHTML = filteredCoupons.map(c => {
                const isRedeemed = c.is_redeemed;
                const isLink = c.code_or_link && (c.code_or_link.includes('http') || c.code_or_link.includes('.co.il'));
                
                return `
                <div class="${isRedeemed ? 'bg-slate-50 opacity-60' : 'bg-white'} p-5 rounded-3xl shadow-sm border ${isRedeemed ? 'border-transparent' : 'border-slate-200'} mb-4 relative overflow-hidden">
                    
                    ${isRedeemed ? '<div class="absolute top-4 left-4 bg-slate-200 text-slate-500 text-[10px] px-2 py-1 rounded-md font-bold uppercase">מומש</div>' : ''}

                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <p class="text-xl font-black text-primary mb-1 ${isRedeemed ? 'text-slate-400' : ''}">${c.value || '₪0'}</p>
                            <p class="font-bold text-slate-500 text-sm ${isRedeemed ? 'line-through' : ''}">${c.company || 'ללא שם'}</p>
                            <p class="text-[11px] font-bold text-slate-400 mt-1 flex items-center gap-1">
                                <span class="material-symbols-rounded text-[13px]">calendar_month</span> 
                                ${c.expiry_date ? 'תוקף: ' + c.expiry_date : 'ללא תוקף'}
                            </p>
                        </div>
                        
                        <button onclick="toggleRedeemed(${c.id}, ${isRedeemed})" class="w-12 h-12 rounded-xl flex items-center justify-center transition-colors shadow-sm ${isRedeemed ? 'bg-slate-200 text-slate-500' : 'bg-green-50 text-green-600 border border-green-100'}">
                            <span class="material-symbols-rounded text-2xl">${isRedeemed ? 'undo' : 'check'}</span>
                        </button>
                    </div>
                    
                    <div class="bg-slate-50 p-3 rounded-xl text-center font-mono font-bold text-lg text-slate-700 break-all select-all border border-slate-100 mb-3 ${isRedeemed ? 'line-through text-slate-400' : ''}">
                        ${c.code_or_link}
                    </div>

                    <div class="flex gap-2">
                        ${isLink ? `<button onclick="window.open('${c.code_or_link.startsWith('http') ? c.code_or_link : 'https://' + c.code_or_link}', '_blank')" class="flex-1 bg-primary text-white py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-1 shadow-sm"><span class="material-symbols-rounded text-[16px]">open_in_new</span>פתח אתר</button>` : ''}
                        
                        <button onclick="copyCode('${c.code_or_link}')" class="flex-1 bg-dark text-white py-2.5 rounded-xl text-xs font-bold shadow-sm">העתק קוד</button>
                        
                        <button onclick="openEdit(${c.id})" class="w-10 bg-white rounded-xl text-slate-400 border border-slate-200 flex items-center justify-center"><span class="material-symbols-rounded text-[18px]">edit</span></button>
                        
                        <button onclick="deleteCoupon(${c.id})" class="w-10 bg-white rounded-xl text-red-400 border border-slate-200 flex items-center justify-center"><span class="material-symbols-rounded text-[18px]">delete</span></button>
                    </div>
                </div>
            `}).join('');
        }

        function copyCode(text) {
            navigator.clipboard.writeText(text);
            alert("הקוד הועתק בהצלחה!");
        }

        async function toggleRedeemed(id, currentState) {
            await supabaseClient.from('coupons').update({ is_redeemed: !currentState }).eq('id', id);
            loadFromCloud();
        }

        async function deleteCoupon(id) {
            if(confirm("האם אתה בטוח שברצונך למחוק קופון זה?")) {
                await supabaseClient.from('coupons').delete().eq('id', id);
                loadFromCloud();
            }
        }

        function openAddModal() { 
            document.getElementById('modalTitle').innerText = "קופון חדש";
            document.getElementById('edit_id').value = 'new';
            document.getElementById('edit_company').value = '';
            document.getElementById('edit_category').value = selectedTab !== 'הכל' ? selectedTab : '';
            document.getElementById('edit_value').value = '';
            document.getElementById('edit_expiry').value = '';
            document.getElementById('edit_code').value = '';
            document.getElementById('editModal').classList.remove('hidden'); 
        }

        function openEdit(id) {
            const c = allCoupons.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = "עריכת קופון";
            document.getElementById('edit_id').value = c.id;
            document.getElementById('edit_company').value = c.company || '';
            document.getElementById('edit_category').value = c.category || 'כללי';
            document.getElementById('edit_value').value = c.value || '';
            document.getElementById('edit_expiry').value = c.expiry_date || '';
            document.getElementById('edit_code').value = c.code_or_link || '';
            document.getElementById('editModal').classList.remove('hidden'); 
        }

        function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }

        async function saveToCloud() {
            const id = document.getElementById('edit_id').value;
            const payload = {
                company: document.getElementById('edit_company').value,
                category: document.getElementById('edit_category').value || 'כללי',
                value: document.getElementById('edit_value').value,
                expiry_date: document.getElementById('edit_expiry').value || null,
                code_or_link: encrypt(document.getElementById('edit_code').value),
                group_id: profile.group_id
            };

            if (id === 'new') {
                payload.is_redeemed = false;
                await supabaseClient.from('coupons').insert([payload]);
            } else {
                await supabaseClient.from('coupons').update(payload).eq('id', id);
            }
            
            selectedTab = payload.category;
            closeEdit();
            loadFromCloud();
        }

        // --- הגדרות ---
        function toggleSubOptions() {
            const masterToggle = document.getElementById('master_toggle').checked;
            const subOptions = document.getElementById('sub_options');
            subOptions.style.opacity = masterToggle ? '1' : '0.5';
            subOptions.style.pointerEvents = masterToggle ? 'auto' : 'none';
        }

        function openSettings() {
            document.getElementById('master_toggle').checked = profile.email_alerts_active ?? true;
            document.getElementById('set_14_days').checked = profile.remind_14_days ?? true;
            document.getElementById('set_7_days').checked = profile.remind_7_days ?? true;
            document.getElementById('set_1_day').checked = profile.remind_1_day ?? true;
            toggleSubOptions();
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

        async function saveSettings() {
            const master = document.getElementById('master_toggle').checked;
            const r14 = document.getElementById('set_14_days').checked;
            const r7 = document.getElementById('set_7_days').checked;
            const r1 = document.getElementById('set_1_day').checked;

            await supabaseClient.from('profiles').update({
                email_alerts_active: master, remind_14_days: r14, remind_7_days: r7, remind_1_day: r1
            }).eq('id', profile.id);

            profile.email_alerts_active = master; profile.remind_14_days = r14; 
            profile.remind_7_days = r7; profile.remind_1_day = r1;
            
            closeSettings();
        }

        async function signInWithGoogle() { await supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin } }); }
        async function signOut() { await supabaseClient.auth.signOut(); window.location.reload(); }

        window.onload = checkUser;
    </script>
</body>
</html>
